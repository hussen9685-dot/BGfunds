<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>ระบบกองทุนเงินฝาก</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root{
    --green-900:#12432c;
    --green-700:#1f6f4a;
    --green-500:#2f9463;
    --green-200:#c9e8d7;
    --green-100:#e8f5ee;
    --bg:#f4f6f5;
    --white:#ffffff;
    --border:#e0e5e1;
    --text:#1d2b24;
    --text-muted:#6b7d74;
    --danger:#b3392c;
    --danger-bg:#fbe9e6;
    --radius:12px;
    --shadow:0 1px 2px rgba(18,67,44,.06), 0 4px 16px rgba(18,67,44,.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Sarabun',sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  button, input, select{font-family:inherit;}
  a{color:inherit;}

  /* ---------- Login ---------- */
  #loginScreen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      linear-gradient(180deg, var(--green-900) 0%, var(--green-700) 55%, var(--green-500) 100%);
    padding:20px;
  }
  .login-card{
    background:var(--white);
    border-radius:var(--radius);
    width:100%;
    max-width:380px;
    padding:36px 30px 28px;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
    position:relative;
    overflow:hidden;
  }
  .login-card::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:6px;
    background:repeating-linear-gradient(90deg, var(--green-700) 0 10px, transparent 10px 18px);
    opacity:.5;
  }
  .login-logo{
    width:56px;height:56px;border-radius:50%;
    background:var(--green-100);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 14px;
    font-size:26px;
    overflow:hidden; background-size:cover; background-position:center;
  }
  .logo-upload-row{display:flex; align-items:center; gap:16px; margin-bottom:6px;}
  .logo-preview{
    width:72px;height:72px;border-radius:50%;
    background:var(--green-100); border:1.5px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-size:30px; flex-shrink:0; overflow:hidden;
    background-size:cover; background-position:center;
  }
  .logo-upload-actions{display:flex; flex-direction:column; gap:8px;}
  .file-input-label{
    display:inline-flex; align-items:center; gap:6px; cursor:pointer;
    font-size:13px; font-weight:600; color:var(--green-700);
    border:1.5px solid var(--green-700); border-radius:9px; padding:8px 14px;
    background:var(--white); width:fit-content;
  }
  .file-input-label:hover{background:var(--green-100);}
  .file-input-label input{display:none;}
  .login-title{text-align:center;font-weight:700;font-size:20px;margin:0 0 4px;color:var(--green-900);}
  .login-sub{text-align:center;color:var(--text-muted);font-size:13.5px;margin:0 0 22px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;font-weight:500;}
  .field input, .field select, .field textarea{
    width:100%;
    padding:11px 12px;
    border:1.5px solid var(--border);
    border-radius:9px;
    font-size:14.5px;
    background:var(--white);
    outline:none;
    transition:border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--green-500);}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    border:none; border-radius:9px; padding:11px 18px;
    font-size:14.5px; font-weight:600; cursor:pointer;
    transition:background .15s, transform .05s;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--green-700); color:#fff; width:100%;}
  .btn-primary:hover{background:var(--green-900);}
  .btn-outline{background:var(--white); color:var(--green-700); border:1.5px solid var(--green-700);}
  .btn-outline:hover{background:var(--green-100);}
  .btn-danger{background:var(--danger-bg); color:var(--danger);}
  .btn-danger:hover{background:#f6d3cd;}
  .btn-ghost{background:transparent; color:var(--text-muted); padding:8px 10px;}
  .btn-ghost:hover{color:var(--text);}
  .btn-sm{padding:7px 12px;font-size:13px;}
  .login-hint{
    margin-top:16px; text-align:center; font-size:12px; color:var(--text-muted);
    background:var(--green-100); border-radius:8px; padding:10px;
  }
  .login-error{
    background:var(--danger-bg); color:var(--danger); font-size:13px;
    padding:9px 12px; border-radius:8px; margin-bottom:14px; display:none;
  }

  /* ---------- App shell ---------- */
  #app{display:none; min-height:100vh;}
  .shell{display:flex; min-height:100vh;}

  .sidebar{
    width:230px; flex-shrink:0;
    background:var(--green-900);
    color:#eaf3ee;
    display:flex; flex-direction:column;
    position:fixed; top:0; bottom:0; left:0;
    z-index:40;
    transition:transform .2s ease;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    padding:20px 18px 16px;
  }
  .brand-icon{
    width:38px;height:38px;border-radius:50%;
    background:var(--green-500);
    display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
    overflow:hidden; background-size:cover; background-position:center;
  }
  .brand-name{font-weight:700; font-size:15px; line-height:1.25; word-break:break-word;}
  .brand-sub{font-size:11px; color:#a9c7b7;}
  .sidebar-stitch{
    margin:0 18px 10px;
    border-top:1.5px dashed rgba(234,243,238,.25);
  }
  .nav{flex:1; padding:6px 10px; overflow-y:auto;}
  .nav-item{
    display:flex; align-items:center; gap:11px;
    padding:11px 12px; border-radius:9px;
    color:#d3e6dc; font-size:14.5px; font-weight:500;
    cursor:pointer; margin-bottom:2px;
    text-decoration:none;
  }
  .nav-item .ico{font-size:17px; width:20px; text-align:center;}
  .nav-item:hover{background:rgba(255,255,255,.06);}
  .nav-item.active{background:var(--green-500); color:#fff;}
  .sidebar-foot{
    padding:14px 18px 20px;
    border-top:1px solid rgba(255,255,255,.08);
    font-size:12.5px;
  }
  .userchip{display:flex; align-items:center; gap:9px; margin-bottom:10px;}
  .userchip-av{
    width:30px;height:30px;border-radius:50%;
    background:var(--green-500); display:flex;align-items:center;justify-content:center;
    font-size:13px; font-weight:700; flex-shrink:0;
  }
  .userchip-name{font-weight:600; color:#fff;}
  .userchip-role{color:#a9c7b7; font-size:11px;}
  .logout-link{color:#f2c4bb; cursor:pointer; font-size:12.5px;}
  .logout-link:hover{text-decoration:underline;}

  .topbar{
    display:none;
    align-items:center; justify-content:space-between;
    background:var(--white); border-bottom:1px solid var(--border);
    padding:12px 16px; position:sticky; top:0; z-index:30;
  }
  .hamburger{
    background:none;border:none;font-size:22px;cursor:pointer;color:var(--green-900);
    padding:4px 8px;
  }
  .topbar-title{font-weight:700; font-size:15px;}

  .main{
    margin-left:230px;
    flex:1; padding:26px 30px 60px;
    max-width:1180px;
  }
  .page-header{
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:12px;
    margin-bottom:18px;
  }
  .page-title{font-size:21px; font-weight:700; color:var(--green-900); margin:0;}
  .page-title-sub{font-size:13px; color:var(--text-muted); margin-top:2px;}
  .page-divider{
    border:none; border-top:1.5px dashed var(--border); margin:0 0 22px;
  }

  .grid-cards{
    display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px;
  }
  .card{
    background:var(--white); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px 18px; box-shadow:var(--shadow);
  }
  .card-label{font-size:12.5px; color:var(--text-muted); font-weight:500; margin-bottom:6px;}
  .card-value{font-size:22px; font-weight:700; color:var(--green-900);}
  .card-value.small{font-size:18px;}
  .panel{
    background:var(--white); border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); margin-bottom:20px; overflow:hidden;
  }
  .panel-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:15px 18px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px;
  }
  .panel-head h3{margin:0; font-size:15.5px; font-weight:700;}
  .panel-body{padding:6px 18px 16px;}

  table{width:100%; border-collapse:collapse; font-size:13.8px;}
  thead th{
    text-align:left; font-size:12px; color:var(--text-muted); font-weight:600;
    padding:10px 10px; border-bottom:1.5px solid var(--border); white-space:nowrap;
  }
  tbody td{padding:11px 10px; border-bottom:1px solid var(--border); vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--green-100);}
  .num{text-align:right; font-variant-numeric:tabular-nums;}
  .badge{
    display:inline-block; font-size:11.5px; font-weight:600; padding:3px 9px; border-radius:20px;
  }
  .badge-green{background:var(--green-100); color:var(--green-700);}
  .badge-gray{background:#eef1ef; color:var(--text-muted);}
  .rank{
    display:inline-flex; align-items:center; justify-content:center;
    width:22px;height:22px;border-radius:50%; background:var(--green-100); color:var(--green-700);
    font-size:11.5px; font-weight:700; margin-right:8px;
  }
  .empty-state{
    text-align:center; padding:40px 20px; color:var(--text-muted); font-size:13.5px;
  }
  .empty-state .e-ico{font-size:30px; margin-bottom:8px;}

  .toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .search-box{
    display:flex; align-items:center; gap:8px;
    border:1.5px solid var(--border); border-radius:9px; padding:8px 12px;
    background:var(--bg); min-width:220px;
  }
  .search-box input{border:none; background:transparent; outline:none; font-size:13.8px; width:100%;}

  .link-btn{color:var(--green-700); font-weight:600; cursor:pointer; font-size:13px;}
  .link-btn:hover{text-decoration:underline;}

  /* Modal */
  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(18,30,24,.45);
    z-index:100; align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--white); border-radius:var(--radius); width:100%; max-width:480px;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
  }
  .modal-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px; border-bottom:1px solid var(--border);
  }
  .modal-head h3{margin:0; font-size:16px;}
  .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);}
  .modal-body{padding:18px 20px;}
  .modal-foot{padding:14px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px;}
  .row-2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--green-900); color:#fff; padding:12px 20px; border-radius:9px;
    font-size:13.8px; box-shadow:0 8px 24px rgba(0,0,0,.25);
    z-index:200; opacity:0; pointer-events:none; transition:all .25s ease;
    display:flex; align-items:center; gap:8px;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast.err{background:var(--danger);}

  .tabs{display:flex; gap:6px; border-bottom:1px solid var(--border); margin-bottom:16px; flex-wrap:wrap;}
  .tab{padding:9px 14px; font-size:13.8px; font-weight:600; color:var(--text-muted); cursor:pointer; border-bottom:2.5px solid transparent;}
  .tab.active{color:var(--green-700); border-color:var(--green-700);}

  .sidebar-backdrop{display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:39;}
  .sidebar-backdrop.show{display:block;}

  @media (max-width: 900px){
    .grid-cards{grid-template-columns:repeat(2,1fr);}
  }
  @media (max-width: 760px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0; padding:16px 14px 50px;}
    .topbar{display:flex;}
    .grid-cards{grid-template-columns:repeat(2,1fr); gap:10px;}
    .row-2{grid-template-columns:1fr;}
    .panel-body{padding:6px 12px 14px;}
    thead{display:none;}
    table, tbody, tr, td{display:block; width:100%;}
    tbody tr{
      border:1px solid var(--border); border-radius:10px; margin-bottom:10px; padding:8px 4px;
    }
    tbody td{border:none; padding:6px 10px; display:flex; justify-content:space-between; gap:10px;}
    tbody td::before{content:attr(data-label); color:var(--text-muted); font-size:12px; font-weight:600;}
    tbody td.no-label::before{display:none;}
    .num{text-align:right;}
  }
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo" id="loginLogo">🌿</div>
    <h1 class="login-title" id="loginFundName">ระบบกองทุนเงินฝาก</h1>
    <div id="loginConnecting" style="text-align:center; padding:18px 0; color:var(--text-muted); font-size:13.8px;">
      ⏳ กำลังเชื่อมต่อฐานข้อมูล...
    </div>

    <div id="loginFormWrap" style="display:none;">
      <p class="login-sub">เข้าสู่ระบบเพื่อจัดการข้อมูลกองทุน</p>
      <div class="login-error" id="loginError">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
      <div class="field">
        <label>ชื่อผู้ใช้</label>
        <input type="text" id="loginUser" placeholder="กรอกชื่อผู้ใช้" autocomplete="username">
      </div>
      <div class="field">
        <label>รหัสผ่าน</label>
        <input type="password" id="loginPass" placeholder="กรอกรหัสผ่าน" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">เข้าสู่ระบบ</button>
      <div class="login-hint" style="cursor:pointer;" onclick="showRegister()">ยังไม่มีบัญชี? <b>ลงทะเบียนที่นี่</b></div>
    </div>

    <div id="regFormWrap" style="display:none;">
      <p class="login-sub">ลงทะเบียนเป็นสมาชิกกองทุน (ต้องมีรหัสเชิญ)</p>
      <div class="login-error" id="regError"></div>
      <div class="field">
        <label>รหัสเชิญ (Invitation Code)</label>
        <input type="text" id="regInviteCode" placeholder="กรอกรหัสเชิญที่ได้รับ">
      </div>
      <div class="field">
        <label>ชื่อ-นามสกุล</label>
        <input type="text" id="regDisplayName" placeholder="เช่น สมหญิง ใจดี">
      </div>
      <div class="row-2">
        <div class="field"><label>เบอร์โทร</label><input type="text" id="regPhone" placeholder="08xxxxxxxx"></div>
        <div class="field"><label>วันที่สมัคร</label><input type="date" id="regJoinDate"></div>
      </div>
      <div class="field">
        <label>ที่อยู่</label>
        <textarea id="regAddress" rows="2" placeholder="ที่อยู่ปัจจุบัน"></textarea>
      </div>
      <div class="field">
        <label>ชื่อผู้ใช้ (สำหรับเข้าสู่ระบบ)</label>
        <input type="text" id="regUsername" placeholder="a-z, 0-9, _ เท่านั้น" autocomplete="username">
      </div>
      <div class="field">
        <label>รหัสผ่าน</label>
        <input type="password" id="regPassword" placeholder="ตั้งรหัสผ่านอย่างน้อย 4 ตัว" autocomplete="new-password">
      </div>
      <div class="field">
        <label>ยืนยันรหัสผ่าน</label>
        <input type="password" id="regPasswordConfirm" placeholder="กรอกรหัสผ่านอีกครั้ง" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" onclick="doRegister()">ลงทะเบียน</button>
      <div class="login-hint" style="cursor:pointer;" onclick="showLogin()">มีบัญชีอยู่แล้ว? <b>เข้าสู่ระบบ</b></div>
    </div>

  </div>
</div>

<!-- ================= APP ================= -->
<div id="app">
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar(false)"></div>
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-icon" id="sbLogo">🌿</div>
        <div>
          <div class="brand-name" id="sbFundName">ระบบกองทุนเงินฝาก</div>
          <div class="brand-sub">บันทึกเงินฝากชุมชน</div>
        </div>
      </div>
      <div class="sidebar-stitch"></div>
      <nav class="nav" id="navList"></nav>
      <div class="sidebar-foot">
        <div class="userchip">
          <div class="userchip-av" id="userAvatar">A</div>
          <div>
            <div class="userchip-name" id="userNameLabel">-</div>
            <div class="userchip-role" id="userRoleLabel">-</div>
          </div>
        </div>
        <span class="logout-link" onclick="doLogout()">ออกจากระบบ →</span>
      </div>
    </aside>

    <div style="flex:1;">
      <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar(true)">☰</button>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div style="width:30px;"></div>
      </div>
      <main class="main" id="mainContent"></main>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   ระบบกองทุนเงินฝาก — single-file app (Firebase Realtime Database backend)
   Tables (RTDB paths): members, deposits, users, settings
========================================================= */

const firebaseConfig = {
  apiKey: "AIzaSyBot0U5JhsYNxgfMPcXSBcJvKOIPl0gE5M",
  authDomain: "bg-funds-5b664.firebaseapp.com",
  databaseURL: "https://bg-funds-5b664-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bg-funds-5b664",
  storageBucket: "bg-funds-5b664.firebasestorage.app",
  messagingSenderId: "767903063015",
  appId: "1:767903063015:web:fe82bf267e28a155843b42",
  measurementId: "G-E6HZ4GFYWJ"
};

const SESSION_KEY = 'gf_session';
let db, refMembers, refDeposits, refUsers, refSettings;
let dataReady = false;

function snapToArray(snap){
  const v = snap.val();
  return v ? Object.values(v) : [];
}
function arrayToKeyedObj(arr, keyFn){
  const o = {};
  arr.forEach(item => { const k = keyFn(item); if(k) o[k] = item; });
  return o;
}

let state = {
  members: [],
  deposits: [],
  users: [],
  settings: {fundName:'ระบบกองทุนเงินฝาก', logo:'🌿', address:'', phone:''},
  currentView: 'dashboard',
  memberDetailId: null,
};

async function initFirebaseData(){
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  refMembers = db.ref('members');
  refDeposits = db.ref('deposits');
  refUsers = db.ref('users');
  refSettings = db.ref('settings');

  const [settingsSnap, usersSnap, membersSnap, depositsSnap] = await Promise.all([
    refSettings.once('value'), refUsers.once('value'), refMembers.once('value'), refDeposits.once('value')
  ]);

  state.settings = settingsSnap.exists() ? settingsSnap.val() : state.settings;
  if(!settingsSnap.exists()) await refSettings.set(state.settings);

  if(usersSnap.exists()){
    state.users = snapToArray(usersSnap);
  }else{
    state.users = [{username:'admin', password:'admin123', role:'Admin', displayName:'ผู้ดูแลระบบ'}];
    await refUsers.set(arrayToKeyedObj(state.users, u=>u.username));
  }
  state.members = snapToArray(membersSnap);
  state.deposits = snapToArray(depositsSnap);

  // live sync: reflect changes made from other devices/tabs
  refMembers.on('value', snap => { state.members = snapToArray(snap); onRemoteUpdate(); });
  refDeposits.on('value', snap => { state.deposits = snapToArray(snap); onRemoteUpdate(); });
  refUsers.on('value', snap => { state.users = snapToArray(snap); onRemoteUpdate(); });
  refSettings.on('value', snap => { if(snap.exists()){ state.settings = snap.val(); applyBranding(); } onRemoteUpdate(); });
}

function onRemoteUpdate(){
  if(!dataReady) return;
  if(document.getElementById('app').style.display !== 'none'){
    navigate(state.currentView, state.memberDetailId);
  }
}

function persistSettings(){
  refSettings.set(state.settings).catch(err => showToast('บันทึกไม่สำเร็จ: '+err.message, true));
}

/* ---------------- Utilities ---------------- */
function fmtMoney(n){
  n = Number(n)||0;
  return n.toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtDate(d){
  if(!d) return '-';
  const dt = new Date(d+'T00:00:00');
  if(isNaN(dt)) return d;
  const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${dt.getDate()} ${months[dt.getMonth()]} ${dt.getFullYear()+543}`;
}
function todayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function uid(prefix){ return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function nextMemberCode(){
  const n = state.members.length + 1;
  return 'M' + String(n).padStart(4,'0');
}
function escapeHtml(s){
  return (s||'').toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function showToast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err':'');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=> t.className = t.className.replace(' show',''), 2400);
}

/* ---------------- Auth ---------------- */
function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const found = state.users.find(x => x.username === u && x.password === p);
  const errBox = document.getElementById('loginError');
  if(!found){
    errBox.style.display='block';
    return;
  }
  errBox.style.display='none';
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({username:found.username, role:found.role, displayName:found.displayName||found.username}));
  enterApp();
}
function showRegister(){
  document.getElementById('loginFormWrap').style.display='none';
  document.getElementById('regFormWrap').style.display='block';
  document.getElementById('regError').style.display='none';
  document.getElementById('regJoinDate').value = todayISO();
}
function showLogin(){
  document.getElementById('regFormWrap').style.display='none';
  document.getElementById('loginFormWrap').style.display='block';
  document.getElementById('loginError').style.display='none';
}
function regShowError(msg){
  const box = document.getElementById('regError');
  box.textContent = msg;
  box.style.display='block';
}
function doRegister(){
  const inviteCode = document.getElementById('regInviteCode').value.trim();
  const displayName = document.getElementById('regDisplayName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const address = document.getElementById('regAddress').value.trim();
  const joinDate = document.getElementById('regJoinDate').value || todayISO();
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const passwordConfirm = document.getElementById('regPasswordConfirm').value;

  if(!state.settings.invitationCode){
    regShowError('ระบบยังไม่เปิดให้ลงทะเบียน กรุณาติดต่อผู้ดูแลระบบ');
    return;
  }
  if(inviteCode !== state.settings.invitationCode){
    regShowError('รหัสเชิญไม่ถูกต้อง');
    return;
  }
  if(!displayName){ regShowError('กรุณากรอกชื่อ-นามสกุล'); return; }
  if(!username){ regShowError('กรุณากรอกชื่อผู้ใช้'); return; }
  if(!/^[a-zA-Z0-9_-]+$/.test(username)){ regShowError('ชื่อผู้ใช้ใช้ได้เฉพาะ a-z, 0-9, _ และ -'); return; }
  if(!password || password.length < 4){ regShowError('รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร'); return; }
  if(password !== passwordConfirm){ regShowError('รหัสผ่านทั้งสองช่องไม่ตรงกัน'); return; }
  if(state.users.some(u=>u.username===username)){ regShowError('มีชื่อผู้ใช้นี้อยู่แล้ว กรุณาเลือกชื่ออื่น'); return; }

  // ลงทะเบียนเสร็จ = เป็นสมาชิกกองทุนทันที
  const newMember = {
    id: uid('mem_'), code: nextMemberCode(), name: displayName, phone, address, joinDate,
    balance:0, depositCount:0,
  };
  state.members.push(newMember);
  refMembers.child(newMember.id).set(newMember).catch(err=>regShowError('ลงทะเบียนไม่สำเร็จ: '+err.message));

  const newUser = {username, password, role:'User', displayName, memberId:newMember.id};
  state.users.push(newUser);
  refUsers.child(username).set(newUser).catch(err=>regShowError('ลงทะเบียนไม่สำเร็จ: '+err.message));

  sessionStorage.setItem(SESSION_KEY, JSON.stringify({username, role:'User', displayName, memberId:newMember.id}));
  showToast(`ลงทะเบียนสำเร็จ ยินดีต้อนรับสมาชิกใหม่ ${displayName}`);
  enterApp();
}
function currentUser(){
  try{ return JSON.parse(sessionStorage.getItem(SESSION_KEY)); }catch(e){ return null; }
}
function doLogout(){
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  showLogin();
}
function isAdmin(){
  const u = currentUser();
  return u && u.role === 'Admin';
}

function enterApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  applyBranding();
  const u = currentUser();
  document.getElementById('userNameLabel').textContent = u.displayName;
  document.getElementById('userRoleLabel').textContent = u.role === 'Admin' ? 'ผู้ดูแลระบบ' : 'ผู้ใช้งาน';
  document.getElementById('userAvatar').textContent = (u.displayName||'?').trim()[0]?.toUpperCase() || '?';
  renderNav();
  navigate('dashboard');
}

function isImageLogo(val){ return typeof val === 'string' && val.startsWith('data:image'); }
function renderLogoInto(el, val){
  if(isImageLogo(val)){
    el.style.backgroundImage = `url(${val})`;
    el.textContent = '';
  }else{
    el.style.backgroundImage = '';
    el.textContent = val || '🌿';
  }
}
function applyBranding(){
  document.getElementById('loginFundName').textContent = state.settings.fundName || 'ระบบกองทุนเงินฝาก';
  document.getElementById('sbFundName').textContent = state.settings.fundName || 'ระบบกองทุนเงินฝาก';

}

function canEditMember(id){
  if(isAdmin()) return true;
  const u = currentUser();
  return !!u && u.memberId === id;
}
function openMemberModal(memberId){
  if(memberId && !canEditMember(memberId)){ showToast('คุณไม่มีสิทธิ์แก้ไขข้อมูลสมาชิกคนนี้', true); return; }
  if(!memberId && !isAdmin()){ showToast('คุณไม่มีสิทธิ์เพิ่มสมาชิก', true); return; }
  const overlay = document.getElementById('memberModalOverlay');
  const m = memberId ? state.members.find(x=>x.id===memberId) : null;
  document.getElementById('memberModalTitle').textContent = m ? 'แก้ไขสมาชิก' : 'เพิ่มสมาชิก';
  document.getElementById('memberFormId').value = m ? m.id : '';
  document.getElementById('memberFormName').value = m ? m.name : '';
  document.getElementById('memberFormPhone').value = m ? m.phone : '';
  document.getElementById('memberFormAddress').value = m ? m.address : '';
  document.getElementById('memberFormJoinDate').value = m ? m.joinDate : todayISO();
  overlay.classList.add('show');
}
function closeMemberModal(){ document.getElementById('memberModalOverlay').classList.remove('show'); }
function saveMember(){
  const id = document.getElementById('memberFormId').value;
  if(id && !canEditMember(id)){ showToast('คุณไม่มีสิทธิ์แก้ไขข้อมูลสมาชิกคนนี้', true); closeMemberModal(); return; }
  if(!id && !isAdmin()){ showToast('คุณไม่มีสิทธิ์เพิ่มสมาชิก', true); closeMemberModal(); return; }
  const name = document.getElementById('memberFormName').value.trim();
  const phone = document.getElementById('memberFormPhone').value.trim();
  const address = document.getElementById('memberFormAddress').value.trim();
  const joinDate = document.getElementById('memberFormJoinDate').value || todayISO();
  if(!name){ showToast('กรุณากรอกชื่อ-นามสกุล', true); return; }

  if(id){
    const m = state.members.find(x=>x.id===id);
    Object.assign(m, {name, phone, address, joinDate});
    refMembers.child(id).update({name, phone, address, joinDate}).catch(err=>showToast('บันทึกไม่สำเร็จ: '+err.message, true));
    showToast('แก้ไขข้อมูลสมาชิกสำเร็จ');
    closeMemberModal();
    if(state.currentView === 'memberDetail') navigate('memberDetail', id); else renderMembers();
  }else{
    const newMember = {
      id: uid('mem_'), code: nextMemberCode(), name, phone, address, joinDate,
      balance:0, depositCount:0,
    };
    state.members.push(newMember);
    refMembers.child(newMember.id).set(newMember).catch(err=>showToast('บันทึกไม่สำเร็จ: '+err.message, true));
    showToast('เพิ่มสมาชิกสำเร็จ');
    closeMemberModal();
    renderMembers();
  }
}
function deleteMember(id){
  if(!isAdmin()){ showToast('เฉพาะผู้ดูแลระบบเท่านั้นที่ลบข้อมูลได้', true); return; }
  if(!confirm('ยืนยันการลบสมาชิกนี้? ประวัติการทำรายการทั้งหมดของสมาชิกจะถูกลบด้วย')) return;
  const relatedDepositIds = state.deposits.filter(d=>d.memberId===id).map(d=>d.id);
  state.members = state.members.filter(m=>m.id!==id);
  state.deposits = state.deposits.filter(d=>d.memberId!==id);
  refMembers.child(id).remove().catch(err=>showToast('ลบไม่สำเร็จ: '+err.message, true));
  relatedDepositIds.forEach(depId => refDeposits.child(depId).remove());
  showToast('ลบสมาชิกสำเร็จ');
  navigate('members');
}

/* ================= DEPOSIT ================= */
function statusOf(d){ return d.status || 'approved'; }
function typeOf(d){ return d.type || 'deposit'; }
function typeBadge(type){
  if(type==='dividend') return `<span class="badge" style="background:#fdeacb; color:#8a5a00;">🎁 ปันผล</span>`;
  if(type==='withdraw') return `<span class="badge" style="background:var(--danger-bg); color:var(--danger);">💸 ถอนเงิน</span>`;
  return `<span class="badge badge-gray">ฝากเงิน</span>`;
}
function statusBadge(status){
  if(status==='pending') return `<span class="badge" style="background:#fff2d9; color:#9a6b00;">รออนุมัติ</span>`;
  if(status==='rejected') return `<span class="badge" style="background:var(--danger-bg); color:var(--danger);">ถูกปฏิเสธ</span>`;
  return `<span class="badge badge-green">อนุมัติแล้ว</span>`;
}
function amountDisplay(d){
  if(typeOf(d)==='withdraw') return `<span style="color:var(--danger);">-${fmtMoney(d.amount)} ฿</span>`;
  return `${fmtMoney(d.amount)} ฿`;
}
function renderDeposit(){
  if(isAdmin()) renderDepositAdmin(); else renderDepositUser();
}

function saveDepositDirect(){
  const memberId = document.getElementById('depMemberId').value;
  const date = document.getElementById('depDate').value || todayISO();
  const amount = parseFloat(document.getElementById('depAmount').value);
  const note = document.getElementById('depNote').value.trim();
  if(!memberId){ showToast('กรุณาเลือกสมาชิก', true); return; }
  if(!amount || amount<=0){ showToast('กรุณากรอกจำนวนเงินให้ถูกต้อง', true); return; }

  const m = state.members.find(x=>x.id===memberId);
  const newBalance = Number(m.balance||0) + amount;
  const newCount = Number(m.depositCount||0) + 1;
  m.balance = newBalance;
  m.depositCount = newCount;
  const depositRecord = {id:uid('dep_'), memberId, date, amount, note, status:'approved', createdAt:Date.now()};
  state.deposits.push(depositRecord);

  refMembers.child(memberId).update({balance:newBalance, depositCount:newCount}).catch(err=>showToast('บันทึกไม่สำเร็จ: '+err.message, true));
  refDeposits.child(depositRecord.id).set(depositRecord).catch(err=>showToast('บันทึกไม่สำเร็จ: '+err.message, true));

  showToast(`บันทึกการฝากเงิน ${fmtMoney(amount)} ฿ ให้ ${m.name} สำเร็จ`);
  renderDepositAdmin();
}
function approveDeposit(depId){
  const d = state.deposits.find(x=>x.id===depId);
  if(!d || statusOf(d)!=='pending' || typeOf(d)!=='deposit') return;
  const m = state.members.find(x=>x.id===d.memberId);
  if(!m){ showToast('ไม่พบสมาชิกของรายการนี้', true); return; }
  const newBalance = Number(m.balance||0) + Number(d.amount||0);
  const newCount = Number(m.depositCount||0) + 1;
  m.balance = newBalance;
  m.depositCount = newCount;
  d.status = 'approved';

  refMembers.child(m.id).update({balance:newBalance, depositCount:newCount}).catch(err=>showToast('อัปเดตไม่สำเร็จ: '+err.message, true));
  refDeposits.child(depId).update({status:'approved'}).catch(err=>showToast('อัปเดตไม่สำเร็จ: '+err.message, true));
  showToast(`อนุมัติการฝากเงิน ${fmtMoney(d.amount)} ฿ ของ ${m.name} สำเร็จ`);
  renderDepositAdmin();
}
function rejectDeposit(depId){
  const d = state.deposits.find(x=>x.id===depId);
  if(!d || statusOf(d)!=='pending' || typeOf(d)!=='deposit') return;
  if(!confirm('ยืนยันการปฏิเสธคำขอฝากเงินนี้?')) return;
  d.status = 'rejected';
  refDeposits.child(depId).update({status:'rejected'}).catch(err=>showToast('อัปเดตไม่สำเร็จ: '+err.message, true));
  showToast('ปฏิเสธคำขอฝากเงินแล้ว');
  renderDepositAdmin();
}

function saveWithdrawRequest(){
  const u = currentUser();
  const m = state.members.find(x=>x.id===u.memberId);
  if(!m){ showToast('ไม่พบข้อมูลสมาชิกของคุณ', true); return; }
  const date = document.getElementById('wdDate').value || todayISO();
  const amount = parseFloat(document.getElementById('wdAmount').value);
  const note = document.getElementById('wdNote').value.trim();
  if(!amount || amount<=0){ showToast('กรุณากรอกจำนวนเงินให้ถูกต้อง', true); return; }
  if(amount > Number(m.balance||0)){ showToast(`ยอดเงินสะสมของคุณไม่เพียงพอ (คงเหลือ ${fmtMoney(m.balance)} ฿)`, true); return; }

  const withdrawRecord = {id:uid('wd_'), memberId:m.id, date, amount, note, type:'withdraw', status:'pending', createdAt:Date.now()};
  state.deposits.push(withdrawRecord);
  refDeposits.child(withdrawRecord.id).set(withdrawRecord).catch(err=>showToast('ส่งคำขอไม่สำเร็จ: '+err.message, true));

  showToast('ส่งคำขอถอนเงินสำเร็จ กำลังรอผู้ดูแลระบบยืนยัน');
  renderWithdrawUser();
}

function exportExcel(){
  if(typeof XLSX === 'undefined'){ showToast('ไม่สามารถโหลดไลบรารี Excel ได้ กรุณาตรวจสอบอินเทอร์เน็ต', true); return; }
  const wb = XLSX.utils.book_new();

  const memberRows = state.members.map(m=>({
    'รหัสสมาชิก':m.code, 'ชื่อ-นามสกุล':m.name, 'เบอร์โทร':m.phone, 'ที่อยู่':m.address,
    'วันที่สมัคร':m.joinDate, 'ยอดเงินสะสม':Number(m.balance||0), 'จำนวนครั้งที่ฝาก':m.depositCount||0,
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(memberRows), 'สมาชิก');

  const statusLabel = {pending:'รออนุมัติ', approved:'อนุมัติแล้ว', rejected:'ถูกปฏิเสธ'};
  const typeLabel = {deposit:'ฝากเงิน', dividend:'ปันผล', withdraw:'ถอนเงิน'};
  const depRows = state.deposits.map(d=>{

    return {'วันที่':d.date, 'รหัสสมาชิก':m?m.code:'', 'ชื่อสมาชิก':m?m.name:'(ลบแล้ว)', 'ประเภท':typeLabel[typeOf(d)], 'จำนวนเงิน':Number(d.amount||0), 'สถานะ':statusLabel[statusOf(d)], 'หมายเหตุ':d.note};
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(depRows), 'ประวัติการทำรายการ');

  const approvedDeposits = state.deposits.filter(d=>statusOf(d)==='approved');
  const totalWithdrawn = approvedDeposits.filter(d=>typeOf(d)==='withdraw').reduce((s,d)=>s+Number(d.amount||0),0);
  const monthly = {};
  approvedDeposits.forEach(d=>{
    const ym=(d.date||'').slice(0,7);
    if(!monthly[ym]) monthly[ym] = {in:0, out:0};
    if(typeOf(d)==='withdraw') monthly[ym].out += Number(d.amount||0); else monthly[ym].in += Number(d.amount||0);
  });
  const summaryRows = [
    {'รายการ':'ยอดคงเหลือรวมทั้งหมด', 'จำนวน':state.members.reduce((s,m)=>s+Number(m.balance||0),0)},
    {'รายการ':'ยอดถอนเงินรวมทั้งหมด', 'จำนวน':totalWithdrawn},
    {'รายการ':'จำนวนสมาชิกทั้งหมด', 'จำนวน':state.members.length},
    ...Object.keys(monthly).sort().flatMap(ym=>([
      {'รายการ':'ยอดฝากเข้าเดือน '+ym, 'จำนวน':monthly[ym].in},
      {'รายการ':'ยอดถอนออกเดือน '+ym, 'จำนวน':monthly[ym].out},
    ])),
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summaryRows), 'สรุป');

  XLSX.writeFile(wb, `รายงานกองทุน_${todayISO()}.xlsx`);
  showToast('Export ไฟล์ Excel สำเร็จ');
}

function updateDivModeLabel(){
  const mode = document.getElementById('divMode').value;
  document.getElementById('divValueLabel').textContent = mode==='rate' ? 'อัตราปันผล (%)' : 'ยอดเงินรวมที่จะแบ่งปันผล (บาท)';
  document.getElementById('divValue').placeholder = mode==='rate' ? 'เช่น 2.5' : 'เช่น 50000';
}
function previewDividend(){
  const date = document.getElementById('divDate').value || todayISO();
  const mode = document.getElementById('divMode').value;
  const value = parseFloat(document.getElementById('divValue').value);
  const note = document.getElementById('divNote').value.trim();
  const area = document.getElementById('dividendPreviewArea');

  if(!value || value<=0){ showToast('กรุณากรอกตัวเลขให้ถูกต้อง', true); return; }
  const eligible = state.members.filter(m => Number(m.balance||0) > 0);
  if(!eligible.length){ showToast('ไม่มีสมาชิกที่มียอดเงินสะสมมากกว่า 0', true); return; }

  const totalBalance = eligible.reduce((s,m)=>s+Number(m.balance||0),0);
  let entries;
  if(mode==='rate'){
    entries = eligible.map(m => ({m, amount: Math.round(Number(m.balance||0) * value/100 * 100)/100}));
  }else{
    entries = eligible.map(m => ({m, amount: Math.round((Number(m.balance||0)/totalBalance) * value * 100)/100}));
  }
  entries = entries.filter(e => e.amount > 0);
  const total = entries.reduce((s,e)=>s+e.amount,0);

  pendingDividendPreview = entries;
  pendingDividendMeta = {date, mode, value, note};

  area.innerHTML = `
    <div style="border:1.5px dashed var(--border); border-radius:10px; padding:14px; margin-top:6px;">
      <div style="font-size:13.8px; font-weight:600; margin-bottom:10px;">ตัวอย่างการจ่ายปันผล — ${entries.length.toLocaleString('th-TH')} คน รวม ${fmtMoney(total)} ฿</div>
      <div style="max-height:280px; overflow-y:auto;">
        <table><thead><tr><th>สมาชิก</th><th>ยอดก่อน</th><th>ปันผลที่ได้</th></tr></thead><tbody>
          ${entries.map(e=>`<tr>
            <td data-label="สมาชิก">${escapeHtml(e.m.name)}</td>
            <td data-label="ยอดก่อน" class="num">${fmtMoney(e.m.balance)} ฿</td>
            <td data-label="ปันผลที่ได้" class="num">+${fmtMoney(e.amount)} ฿</td>
          </tr>`).join('')}
        </tbody></table>
      </div>
      <div style="display:flex; gap:10px; margin-top:14px;">
        <button class="btn btn-primary" style="width:auto;" onclick="confirmDividend()">✓ ยืนยันจ่ายปันผล</button>
        <button class="btn btn-ghost" onclick="document.getElementById('dividendPreviewArea').innerHTML=''; pendingDividendPreview=null;">ยกเลิก</button>
      </div>
    </div>
  `;
}
function confirmDividend(){
  if(!pendingDividendPreview || !pendingDividendPreview.length){ showToast('กรุณาคำนวณตัวอย่างก่อน', true); return; }
  if(!confirm(`ยืนยันจ่ายเงินปันผลให้สมาชิก ${pendingDividendPreview.length} คน?`)) return;

  const roundId = uid('divround_');
  const meta = pendingDividendMeta;
  const defaultNote = meta.note || (meta.mode==='rate' ? `ปันผล ${meta.value}%` : 'ปันผลกองทุน');
  const updates = {};
  let totalDistributed = 0;

  pendingDividendPreview.forEach(({m, amount})=>{
    const newBalance = Number(m.balance||0) + amount;
    const depId = uid('div_');
    const depRecord = {id:depId, memberId:m.id, date:meta.date, amount, note:defaultNote, type:'dividend', status:'approved', roundId, createdAt:Date.now()};
    updates['deposits/'+depId] = depRecord;
    updates['members/'+m.id+'/balance'] = newBalance;
    m.balance = newBalance;
    state.deposits.push(depRecord);
    totalDistributed += amount;
  });

  db.ref().update(updates).catch(err=>showToast('บันทึกปันผลไม่สำเร็จบางส่วน: '+err.message, true));

  showToast(`จ่ายเงินปันผลรวม ${fmtMoney(totalDistributed)} ฿ ให้สมาชิก ${pendingDividendPreview.length} คน สำเร็จ`);
  pendingDividendPreview = null;
  pendingDividendMeta = null;
  renderDividend();
}

          <label>รหัสเชิญลงทะเบียน (Invitation Code)</label>
          <div style="display:flex; gap:8px;">
            <input id="setInviteCode" value="${escapeHtml(s.invitationCode||'')}" placeholder="เช่น BG2569">
            <button type="button" class="btn btn-outline btn-sm" style="width:auto; white-space:nowrap;" onclick="generateInviteCode()">🎲 สุ่มรหัส</button>
          </div>
          <div style="font-size:12px; color:var(--text-muted); margin-top:6px;">แจกรหัสนี้ให้เฉพาะคนที่ต้องการให้ลงทะเบียนเป็นสมาชิกได้ (สิทธิ์ User) ถ้าเว้นว่างจะปิดการลงทะเบียนทันที</div>
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">💾 บันทึกการตั้งค่า</button>
      </div>
    </div>
  `;
  renderLogoInto(document.getElementById('logoPreview'), s.logo);
}
function handleLogoUpload(input){
  const file = input.files && input.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ showToast('กรุณาเลือกไฟล์รูปภาพ', true); return; }
  if(file.size > 1.5*1024*1024){ showToast('ไฟล์ใหญ่เกินไป กรุณาเลือกรูปไม่เกิน 1.5MB', true); return; }
  const reader = new FileReader();
  reader.onload = e => {
    pendingLogo = e.target.result;
    renderLogoInto(document.getElementById('logoPreview'), pendingLogo);
  };
  reader.readAsDataURL(file);
}
function resetLogoToDefault(){
  pendingLogo = '🌿';
  renderLogoInto(document.getElementById('logoPreview'), pendingLogo);
}
function generateInviteCode(){
  const code = Math.random().toString(36).slice(2,8).toUpperCase();
  document.getElementById('setInviteCode').value = code;
}
function saveSettings(){
  state.settings.fundName = document.getElementById('setFundName').value.trim() || 'ระบบกองทุนเงินฝาก';
  if(pendingLogo !== undefined) state.settings.logo = pendingLogo;
  state.settings.address = document.getElementById('setAddress').value.trim();
  state.settings.phone = document.getElementById('setPhone').value.trim();
  state.settings.invitationCode = document.getElementById('setInviteCode').value.trim();
  persistSettings();
  applyBranding();
  renderSettingsGeneral();
  showToast('บันทึกการตั้งค่าสำเร็จ');
}
function renderSettingsUsers(){
  document.getElementById('settingsTabBody').innerHTML = `
    <div class="panel">
      <div class="panel-head"><h3>รายชื่อผู้ใช้งาน</h3><button class="btn btn-primary btn-sm" style="width:auto;" onclick="openUserModal()">+ เพิ่มผู้ใช้งาน</button></div>
      <div class="panel-body">
        <table><thead><tr><th>ชื่อผู้ใช้</th><th>ชื่อที่แสดง</th><th>ระดับสิทธิ์</th><th></th></tr></thead><tbody>
          ${state.users.map(u=>`<tr>
            <td data-label="ชื่อผู้ใช้">${escapeHtml(u.username)}</td>
            <td data-label="ชื่อที่แสดง">${escapeHtml(u.displayName||'-')}</td>
            <td data-label="ระดับสิทธิ์"><span class="badge ${u.role==='Admin'?'badge-green':'badge-gray'}">${u.role==='Admin'?'Admin':'User'}</span></td>
            <td class="no-label" style="text-align:right;">
              ${state.users.length>1 ? `<span class="link-btn" style="color:var(--danger);" onclick="deleteUser('${u.username}')">ลบ</span>` : ''}
            </td>
          </tr>`).join('')}
        </tbody></table>
      </div>
    </div>
    ${userModalHTML()}
  `;
}
function userModalHTML(){
  return `
  <div class="modal-overlay" id="userModalOverlay">
    <div class="modal">
      <div class="modal-head"><h3>เพิ่มผู้ใช้งาน</h3><button class="modal-close" onclick="closeUserModal()">✕</button></div>
      <div class="modal-body">
        <div class="field"><label>ชื่อผู้ใช้ (สำหรับเข้าสู่ระบบ)</label><input id="userFormUsername" placeholder="เช่น staff01"></div>
        <div class="field"><label>ชื่อที่แสดง</label><input id="userFormDisplay" placeholder="เช่น สมหญิง พนักงาน"></div>
        <div class="field"><label>รหัสผ่าน</label><input type="password" id="userFormPassword" placeholder="ตั้งรหัสผ่าน"></div>
        <div class="field"><label>ระดับสิทธิ์</label>
          <select id="userFormRole">
            <option value="User">User (เพิ่ม/แก้ไขข้อมูล, ดูรายงาน)</option>
            <option value="Admin">Admin (ทำได้ทุกอย่าง)</option>
          </select>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeUserModal()">ยกเลิก</button>
        <button class="btn btn-primary" style="width:auto;" onclick="saveUser()">บันทึก</button>
      </div>
    </div>
  </div>`;
}
function openUserModal(){ document.getElementById('userModalOverlay').classList.add('show'); }
function closeUserModal(){ document.getElementById('userModalOverlay').classList.remove('show'); }
function saveUser(){
  const username = document.getElementById('userFormUsername').value.trim();
  const displayName = document.getElementById('userFormDisplay').value.trim();
  const password = document.getElementById('userFormPassword').value;
  const role = document.getElementById('userFormRole').value;
  if(!username || !password){ showToast('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน', true); return; }
  if(!/^[a-zA-Z0-9_-]+$/.test(username)){ showToast('ชื่อผู้ใช้ใช้ได้เฉพาะ a-z, 0-9, _ และ -', true); return; }
  if(state.users.some(u=>u.username===username)){ showToast('มีชื่อผู้ใช้นี้อยู่แล้ว', true); return; }
  const newUser = {username, password, role, displayName};
  state.users.push(newUser);
  refUsers.child(username).set(newUser).catch(err=>showToast('บันทึกไม่สำเร็จ: '+err.message, true));
  closeUserModal();
  showToast('เพิ่มผู้ใช้งานสำเร็จ');
  renderSettingsUsers();
}
function deleteUser(username){
  if(!confirm(`ยืนยันการลบผู้ใช้งาน "${username}"?`)) return;
  state.users = state.users.filter(u=>u.username!==username);
  refUsers.child(username).remove().catch(err=>showToast('ลบไม่สำเร็จ: '+err.message, true));
  showToast('ลบผู้ใช้งานสำเร็จ');
  renderSettingsUsers();
}

/* ---------------- boot ---------------- */
async function boot(){
  document.getElementById('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  document.getElementById('loginUser').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  document.getElementById('regPasswordConfirm').addEventListener('keydown', e=>{ if(e.key==='Enter') doRegister(); });

  applyBranding();
  try{
    await initFirebaseData();
  }catch(err){
    console.error(err);
    document.getElementById('loginConnecting').textContent = '⚠️ เชื่อมต่อฐานข้อมูลไม่สำเร็จ กรุณาตรวจสอบอินเทอร์เน็ตแล้วรีเฟรชหน้า';
    return;
  }
  dataReady = true;
  applyBranding();
  document.getElementById('loginConnecting').style.display = 'none';
  document.getElementById('loginFormWrap').style.display = 'block';

  const u = currentUser();
  if(u && state.users.some(x=>x.username===u.username)){ enterApp(); }
  else if(u){ sessionStorage.removeItem(SESSION_KEY); }
}
boot();
</script>
</body>
</html>
